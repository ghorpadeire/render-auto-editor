# Free-tier Render blueprint for the transcription API only.
# The background worker/database are disabled for this Hermes MVP path.
services:
  - type: web
    name: render-auto-editor-api
    runtime: docker
    repo: https://github.com/ghorpadeire/render-auto-editor
    plan: free
    region: oregon
    branch: claude/hermes-reel-analyzer-ZrnlK
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    envVars:
      - key: APP_ROLE
        value: api
      - key: SPRING_PROFILES_ACTIVE
        value: nodb
      - key: STORAGE_BUCKET
        sync: false
      - key: STORAGE_REGION
        value: auto
      - key: STORAGE_ENDPOINT
        sync: false
      - key: STORAGE_ACCESS_KEY
        sync: false
      - key: STORAGE_SECRET_KEY
        sync: false
      - key: TRANSCRIBE_API_KEY
        sync: false
