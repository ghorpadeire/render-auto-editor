databases:
  - name: render-auto-editor-db
    plan: basic-256mb
    postgresMajorVersion: "16"

services:
  - type: web
    name: render-auto-editor-api
    runtime: docker
    plan: starter
    region: oregon
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    envVars:
      - key: APP_ROLE
        value: api
      - key: DATABASE_URL
        fromDatabase:
          name: render-auto-editor-db
          property: connectionString
      - key: STORAGE_BUCKET
        sync: false
      - key: STORAGE_REGION
        value: auto
      - key: STORAGE_ENDPOINT
        sync: false
      - key: STORAGE_ACCESS_KEY
        sync: false
      - key: STORAGE_SECRET_KEY
        sync: false

  - type: worker
    name: render-auto-editor-worker
    runtime: docker
    plan: starter
    region: oregon
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: APP_ROLE
        value: worker
      - key: DATABASE_URL
        fromDatabase:
          name: render-auto-editor-db
          property: connectionString
      - key: STORAGE_BUCKET
        sync: false
      - key: STORAGE_REGION
        value: auto
      - key: STORAGE_ENDPOINT
        sync: false
      - key: STORAGE_ACCESS_KEY
        sync: false
      - key: STORAGE_SECRET_KEY
        sync: false
