# Postgres database is intentionally hidden for now so the API can be
# deployed on Render without provisioning a database. To re-enable later:
#   1. Uncomment the `databases:` block below.
#   2. Uncomment the two `DATABASE_URL` env vars on each service.
#   3. Remove the `SPRING_PROFILES_ACTIVE=nodb` env var on each service.
#
# databases:
#   - name: render-auto-editor-db
#     plan: basic-256mb
#     postgresMajorVersion: "16"

services:
  - type: web
    name: render-auto-editor-api
    runtime: docker
    plan: starter
    region: oregon
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    envVars:
      - key: APP_ROLE
        value: api
      - key: SPRING_PROFILES_ACTIVE
        value: nodb
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: render-auto-editor-db
      #     property: connectionString
      - key: STORAGE_BUCKET
        sync: false
      - key: STORAGE_REGION
        value: auto
      - key: STORAGE_ENDPOINT
        sync: false
      - key: STORAGE_ACCESS_KEY
        sync: false
      - key: STORAGE_SECRET_KEY
        sync: false

  - type: worker
    name: render-auto-editor-worker
    runtime: docker
    plan: starter
    region: oregon
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: APP_ROLE
        value: worker
      - key: SPRING_PROFILES_ACTIVE
        value: nodb
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: render-auto-editor-db
      #     property: connectionString
      - key: STORAGE_BUCKET
        sync: false
      - key: STORAGE_REGION
        value: auto
      - key: STORAGE_ENDPOINT
        sync: false
      - key: STORAGE_ACCESS_KEY
        sync: false
      - key: STORAGE_SECRET_KEY
        sync: false
