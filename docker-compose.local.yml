services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: autoedit
      POSTGRES_USER: autoedit
      POSTGRES_PASSWORD: autoedit
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U autoedit -d autoedit"]
      interval: 5s
      timeout: 3s
      retries: 20

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20

  createbucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb -p local/autoedit || true &&
      mc anonymous set private local/autoedit || true
      "

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      createbucket:
        condition: service_completed_successfully
    environment:
      APP_ROLE: api
      JDBC_DATABASE_URL: jdbc:postgresql://postgres:5432/autoedit
      JDBC_DATABASE_USERNAME: autoedit
      JDBC_DATABASE_PASSWORD: autoedit

      STORAGE_BUCKET: autoedit
      STORAGE_REGION: us-east-1
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_PRESIGN_ENDPOINT: http://localhost:9000
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin
    ports:
      - "8081:8080"

  worker:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      createbucket:
        condition: service_completed_successfully
    environment:
      APP_ROLE: worker
      JDBC_DATABASE_URL: jdbc:postgresql://postgres:5432/autoedit
      JDBC_DATABASE_USERNAME: autoedit
      JDBC_DATABASE_PASSWORD: autoedit

      STORAGE_BUCKET: autoedit
      STORAGE_REGION: us-east-1
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_PRESIGN_ENDPOINT: http://localhost:9000
      STORAGE_ACCESS_KEY: minioadmin
      STORAGE_SECRET_KEY: minioadmin

