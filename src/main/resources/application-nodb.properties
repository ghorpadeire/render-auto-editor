# "nodb" profile: lets the app boot on Render without a Postgres database.
# All DB-dependent beans (JobRepository, JobsController, WorkerLoop) are
# gated with @Profile("!nodb"); the API will only expose /healthz and any
# storage-only endpoints. Switch this off (remove SPRING_PROFILES_ACTIVE=nodb)
# once the database is provisioned.

spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,\
  org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration,\
  org.springframework.boot.autoconfigure.jdbc.JdbcTemplateAutoConfiguration,\
  org.springframework.boot.autoconfigure.flyway.FlywayAutoConfiguration

spring.flyway.enabled=false
