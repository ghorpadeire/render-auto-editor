server.port=${PORT:8080}

# app.role: api | worker
app.role=${APP_ROLE:api}

# API
api.max-queue-depth=50

# Worker polling
worker.poll-interval-ms=1500
worker.lease-seconds=900
worker.max-attempts=3
worker.local-workdir=/tmp/autoedit

# Editing defaults
edit.pause-threshold-ms=1500
edit.padding-ms=120
edit.min-keep-segment-ms=400
edit.filler-words=um,uh,ah,hmm,err,erm,uhh,umm

# Storage (S3-compatible, e.g. Cloudflare R2)
storage.bucket=${STORAGE_BUCKET:}
storage.region=${STORAGE_REGION:auto}
storage.endpoint=${STORAGE_ENDPOINT:}
storage.presign-endpoint=${STORAGE_PRESIGN_ENDPOINT:}
storage.access-key=${STORAGE_ACCESS_KEY:}
storage.secret-key=${STORAGE_SECRET_KEY:}
storage.inputs-prefix=inputs
storage.outputs-prefix=outputs

# Presigned URLs
storage.presign.upload-minutes=60
storage.presign.download-minutes=120

# Multipart upload limits (500MB)
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# whisper.cpp + ffmpeg
tools.ffmpeg-path=${FFMPEG_PATH:ffmpeg}
tools.whisper-path=${WHISPER_PATH:whisper-cli}
tools.whisper-model-path=${WHISPER_MODEL_PATH:/opt/models/ggml-base.bin}

# Hermes integration — set TRANSCRIBE_API_KEY env var to require authentication
transcribe.api-key=${TRANSCRIBE_API_KEY:}

# Flyway
spring.flyway.enabled=true

# DB (Render sets DATABASE_URL; we map it in Docker/Render env)
spring.datasource.url=${JDBC_DATABASE_URL:}
spring.datasource.username=${JDBC_DATABASE_USERNAME:}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:}
spring.datasource.hikari.maximum-pool-size=5

