<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto Editor — Remove Filler Words & Pauses</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .container { max-width: 560px; width: 100%; padding: 40px 24px; }
        h1 { font-size: 1.6rem; margin-bottom: 6px; color: #fff; }
        .subtitle { color: #888; margin-bottom: 32px; font-size: 0.95rem; }
        .upload-area { border: 2px dashed #333; border-radius: 12px; padding: 48px 24px; text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s; margin-bottom: 20px; }
        .upload-area:hover, .upload-area.dragover { border-color: #646cff; background: #1a1a2e; }
        .upload-area p { color: #aaa; margin-top: 8px; font-size: 0.9rem; }
        .upload-icon { font-size: 2.5rem; margin-bottom: 8px; }
        input[type="file"] { display: none; }
        .file-info { background: #1a1a1a; border-radius: 8px; padding: 12px 16px; margin-bottom: 20px; display: none; justify-content: space-between; align-items: center; }
        .file-info .name { font-weight: 500; color: #fff; }
        .file-info .size { color: #888; font-size: 0.85rem; }
        .file-info .remove { color: #ff4444; cursor: pointer; font-size: 0.85rem; }
        button { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        button.primary { background: #646cff; color: #fff; }
        button.primary:hover { background: #535bf2; }
        button.primary:disabled { background: #333; color: #666; cursor: not-allowed; }
        button.download { background: #22c55e; color: #fff; margin-top: 12px; }
        button.download:hover { background: #16a34a; }
        .status { margin-top: 24px; padding: 16px; border-radius: 8px; background: #1a1a1a; display: none; }
        .status h3 { font-size: 0.95rem; margin-bottom: 8px; }
        .progress-bar { height: 6px; background: #333; border-radius: 3px; overflow: hidden; margin: 12px 0; }
        .progress-bar .fill { height: 100%; background: #646cff; transition: width 0.3s; border-radius: 3px; }
        .status-text { color: #aaa; font-size: 0.85rem; }
        .error { color: #ff4444; }
        .success { color: #22c55e; }
    </style>
</head>
<body>
<div class="container">
    <h1>Auto Editor</h1>
    <p class="subtitle">Upload an MP4 — filler words and long pauses are removed automatically.</p>

    <div class="upload-area" id="dropZone">
        <div class="upload-icon">&#128249;</div>
        <strong>Drop your MP4 here</strong>
        <p>or click to browse (max 500 MB)</p>
    </div>
    <input type="file" id="fileInput" accept=".mp4,video/mp4">

    <div class="file-info" id="fileInfo">
        <div>
            <span class="name" id="fileName"></span>
            <span class="size" id="fileSize"></span>
        </div>
        <span class="remove" id="removeFile">Remove</span>
    </div>

    <button class="primary" id="uploadBtn" disabled>Upload & Process</button>

    <div class="status" id="status">
        <h3 id="statusTitle">Uploading...</h3>
        <div class="progress-bar"><div class="fill" id="progressFill"></div></div>
        <p class="status-text" id="statusText"></p>
        <button class="download" id="downloadBtn" style="display:none">Download Cleaned Video</button>
    </div>
</div>

<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileInfo = document.getElementById('fileInfo');
    const fileName = document.getElementById('fileName');
    const fileSize = document.getElementById('fileSize');
    const removeFile = document.getElementById('removeFile');
    const uploadBtn = document.getElementById('uploadBtn');
    const status = document.getElementById('status');
    const statusTitle = document.getElementById('statusTitle');
    const statusText = document.getElementById('statusText');
    const progressFill = document.getElementById('progressFill');
    const downloadBtn = document.getElementById('downloadBtn');

    let selectedFile = null;

    dropZone.addEventListener('click', () => fileInput.click());
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length) selectFile(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener('change', () => { if (fileInput.files.length) selectFile(fileInput.files[0]); });
    removeFile.addEventListener('click', clearFile);

    function selectFile(file) {
        if (!file.name.toLowerCase().endsWith('.mp4')) {
            alert('Please select an MP4 file.');
            return;
        }
        selectedFile = file;
        fileName.textContent = file.name;
        fileSize.textContent = ' (' + formatSize(file.size) + ')';
        fileInfo.style.display = 'flex';
        dropZone.style.display = 'none';
        uploadBtn.disabled = false;
    }

    function clearFile() {
        selectedFile = null;
        fileInput.value = '';
        fileInfo.style.display = 'none';
        dropZone.style.display = 'block';
        uploadBtn.disabled = true;
    }

    function formatSize(bytes) {
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(0) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    uploadBtn.addEventListener('click', async () => {
        if (!selectedFile) return;

        uploadBtn.disabled = true;
        status.style.display = 'block';
        statusTitle.textContent = 'Uploading...';
        statusTitle.className = '';
        statusText.textContent = 'Sending video to server...';
        progressFill.style.width = '10%';
        downloadBtn.style.display = 'none';

        try {
            const formData = new FormData();
            formData.append('file', selectedFile);

            const xhr = new XMLHttpRequest();
            const uploadResult = await new Promise((resolve, reject) => {
                xhr.upload.addEventListener('progress', e => {
                    if (e.lengthComputable) {
                        const pct = Math.round((e.loaded / e.total) * 40);
                        progressFill.style.width = pct + '%';
                    }
                });
                xhr.addEventListener('load', () => {
                    if (xhr.status === 200) resolve(JSON.parse(xhr.responseText));
                    else reject(new Error('Upload failed: ' + xhr.statusText));
                });
                xhr.addEventListener('error', () => reject(new Error('Network error')));
                xhr.open('POST', '/v1/direct/upload');
                xhr.send(formData);
            });

            const jobId = uploadResult.jobId;
            statusTitle.textContent = 'Processing...';
            statusText.textContent = 'Removing filler words and pauses — this may take a few minutes.';
            progressFill.style.width = '50%';

            // Poll for completion
            let done = false;
            while (!done) {
                await new Promise(r => setTimeout(r, 3000));
                const res = await fetch('/v1/direct/status/' + jobId);
                const job = await res.json();

                if (job.status === 'SUCCEEDED') {
                    done = true;
                    progressFill.style.width = '100%';
                    statusTitle.textContent = 'Done!';
                    statusTitle.className = 'success';
                    statusText.textContent = 'Your cleaned video is ready.';
                    downloadBtn.style.display = 'block';
                    downloadBtn.onclick = () => {
                        window.location.href = job.downloadUrl;
                    };
                } else if (job.status === 'FAILED') {
                    done = true;
                    progressFill.style.width = '100%';
                    progressFill.style.background = '#ff4444';
                    statusTitle.textContent = 'Processing Failed';
                    statusTitle.className = 'error';
                    statusText.textContent = job.error || 'An error occurred during processing.';
                    uploadBtn.disabled = false;
                } else {
                    // Still processing
                    let pct = 50 + Math.min(40, (job.attemptCount || 0) * 10);
                    progressFill.style.width = pct + '%';
                }
            }
        } catch (err) {
            statusTitle.textContent = 'Error';
            statusTitle.className = 'error';
            statusText.textContent = err.message;
            uploadBtn.disabled = false;
        }
    });
</script>
</body>
</html>
